name: Supabase Database Sync

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/**'
      - 'src/data/**'
      - '.github/workflows/supabase-sync.yml'
  workflow_dispatch:

jobs:
  sync-database:
    runs-on: ubuntu-latest
    name: Sync Database Schema and Data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Syncing database schema..."
          # Apply schema changes
          npx supabase db push --linked || echo "No linked project, using direct SQL"

      - name: Sync product data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Syncing product data..."
          node scripts/sync-products.js || echo "Product sync script not found"

      - name: Notify admin dashboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Notifying admin dashboard of sync completion..."
          curl -X POST "${SUPABASE_URL}/functions/v1/github-sync" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "github_push_sync",
              "commit_sha": "'${{ github.sha }}'",
              "commit_message": "'${{ github.event.head_commit.message }}'",
              "branch": "'${{ github.ref_name }}'",
              "triggered_by": "'${{ github.actor }}'"
            }' || echo "Notification endpoint not available"

      - name: Sync completion notification
        if: always()
        run: |
          echo "Database sync completed at $(date)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
