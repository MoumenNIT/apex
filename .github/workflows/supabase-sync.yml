name: Supabase Database Sync

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-database:
    runs-on: ubuntu-latest
    name: Sync Database Schema and Data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log sync info
        run: |
          echo "GitHub push detected"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Database sync is optional - manual sync via Supabase dashboard"
